<svg viewBox="0 0 760 616" xmlns="http://www.w3.org/2000/svg">
<defs><pattern id="hx2" width="40" height="70" patternUnits="userSpaceOnUse"><path d="M20 0 L40 12 L40 35 L20 47 L0 35 L0 12 Z" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="1"/></pattern></defs>
<rect width="760" height="616" fill="#0B1220"/>
<rect width="760" height="616" fill="url(#hx2)"/>
<text x="380.0" y="36" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="18" font-weight="600" fill="#E2EAF5">Intellipod — Example Request Flow</text>
<line x1="56" y1="70" x2="56" y2="500" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
<circle cx="56" cy="70" r="17" fill="#0F1728" stroke="#4A9EFF" stroke-width="2"/>
<text x="56" y="75" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" font-weight="700" fill="#4A9EFF">1</text>
<text x="96" y="62" font-family="JetBrains Mono, monospace" font-size="10.5" letter-spacing="0.05em" fill="#4A9EFF">USER</text>
<text x="96" y="80" font-family="Inter, sans-serif" font-size="13" fill="#E2EAF5">Asks: "Turn arXiv 2305.14314 into a 10-minute, 2-speaker</text>
<text x="96" y="96" font-family="Inter, sans-serif" font-size="13" fill="#E2EAF5">podcast."</text>
<circle cx="56" cy="156" r="17" fill="#0F1728" stroke="#9B7BFF" stroke-width="2"/>
<text x="56" y="161" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" font-weight="700" fill="#9B7BFF">2</text>
<text x="96" y="148" font-family="JetBrains Mono, monospace" font-size="10.5" letter-spacing="0.05em" fill="#9B7BFF">SEARCH AGENT</text>
<text x="96" y="166" font-family="Inter, sans-serif" font-size="13" fill="#E2EAF5">Resolves the paper via the ArXiv MCP server.</text>
<circle cx="56" cy="242" r="17" fill="#0F1728" stroke="#00D4FF" stroke-width="2"/>
<text x="56" y="247" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" font-weight="700" fill="#00D4FF">3</text>
<text x="96" y="234" font-family="JetBrains Mono, monospace" font-size="10.5" letter-spacing="0.05em" fill="#00D4FF">PARSE STAGE</text>
<text x="96" y="252" font-family="Inter, sans-serif" font-size="13" fill="#E2EAF5">Downloads the PDF and extracts structured text.</text>
<circle cx="56" cy="328" r="17" fill="#0F1728" stroke="#00FF88" stroke-width="2"/>
<text x="56" y="333" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" font-weight="700" fill="#00FF88">4</text>
<text x="96" y="320" font-family="JetBrains Mono, monospace" font-size="10.5" letter-spacing="0.05em" fill="#00FF88">SCRIPT AGENT</text>
<text x="96" y="338" font-family="Inter, sans-serif" font-size="13" fill="#E2EAF5">Generates a multi-speaker script at the requested length.</text>
<circle cx="56" cy="414" r="17" fill="#0F1728" stroke="#FFB547" stroke-width="2"/>
<text x="56" y="419" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" font-weight="700" fill="#FFB547">5</text>
<text x="96" y="406" font-family="JetBrains Mono, monospace" font-size="10.5" letter-spacing="0.05em" fill="#FFB547">AUDIO STAGE</text>
<text x="96" y="424" font-family="Inter, sans-serif" font-size="13" fill="#E2EAF5">Synthesizes narration for each speaker.</text>
<circle cx="56" cy="500" r="17" fill="#0F1728" stroke="#4A9EFF" stroke-width="2"/>
<text x="56" y="505" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" font-weight="700" fill="#4A9EFF">6</text>
<text x="96" y="492" font-family="JetBrains Mono, monospace" font-size="10.5" letter-spacing="0.05em" fill="#4A9EFF">USER</text>
<text x="96" y="510" font-family="Inter, sans-serif" font-size="13" fill="#E2EAF5">Receives a playable / downloadable podcast episode.</text>
<rect x="0.5" y="0.5" width="759" height="615" rx="10" fill="none" stroke="rgba(255,255,255,0.12)"/>
